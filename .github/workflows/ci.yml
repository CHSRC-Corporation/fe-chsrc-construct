name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test --if-present

      - name: Cypress E2E
        uses: cypress-io/github-action@v6
        with:
          install: false
          start: npm run preview -- --host 127.0.0.1 --port 5173
          wait-on: http://127.0.0.1:5173
          command: npm run cy:run
